<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dykema North - Bloomfield Hills Office Manager</title>
    <style>
        :root {
            --vacant-green: #2e7d32;
            --vacant-bg: #e8f5e9;
            --reserved-red: #c62828;
            --reserved-bg: #ffebee;
            --regus-dark: #1a1a1a;
            --desk-blue: #0277bd;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f2f5; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 1200px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .office-area {
            flex: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        .column-label {
            text-align: center;
            font-weight: 700;
            color: #444;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .office-row {
            display: flex;
            gap: 10px;
            min-height: 55px;
        }

        .office-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            padding: 5px;
        }

        .office-card:hover:not(.is-reserved) {
            border-color: var(--regus-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .split-desk { border-top: 3px solid var(--desk-blue); }

        .is-vacant { background-color: var(--vacant-bg); color: var(--vacant-green); border-color: #c8e6c9; }
        .is-reserved { background-color: var(--reserved-bg); color: var(--reserved-red); border-color: #ffcdd2; cursor: default; }

        .office-id { font-weight: 700; font-size: 0.85rem; }
        .reserve-info { font-size: 10px; margin-top: 2px; line-height: 1.2; }
        .status-text { font-size: 8px; text-transform: uppercase; font-weight: bold; margin-top: 2px; }

        .sidebar {
            flex: 0.8;
            padding: 40px;
            background: #fafafa;
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .brand-header h1 { margin: 0; font-size: 1.3rem; color: var(--regus-dark); }
        .brand-header p { margin: 5px 0 25px; font-size: 0.8rem; color: #666; line-height: 1.4; }

        .booking-box {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 4px; font-weight: 700; color: #444; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }

        .btn-confirm {
            width: 100%;
            background: var(--regus-dark);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-reset { background: none; border: none; color: #ccc; font-size: 10px; text-decoration: underline; cursor: pointer; margin-top: auto; align-self: center; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="office-area">
        <div>
            <div class="column-label">Section A (External)</div>
            <div id="grid-a" class="grid"></div>
        </div>
        <div>
            <div class="column-label">Section Z (Internal)</div>
            <div id="grid-z" class="grid"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="brand-header">
            <h1>Dykema North</h1>
            <p>41000 Woodward Avenue<br>Suite 350, Bloomfield Hills, MI 48304</p>
        </div>

        <div id="default-msg">
            <p style="color:#aaa; text-align: center; font-size: 0.85rem; margin-top: 40px;">Select an office to reserve.</p>
        </div>

        <div id="booking-form" class="hidden">
            <div class="booking-box">
                <h3 style="margin: 0 0 15px 0; font-size: 1rem;">Booking: <span id="selected-office-name"></span></h3>
                <div class="input-group">
                    <label>Reserving For (Name)</label>
                    <input type="text" id="user-name" placeholder="Adam">
                </div>
                <div class="input-group">
                    <label>Duration</label>
                    <select id="lease-term">
                        <option value="1">Daily</option>
                        <option value="7">Weekly</option>
                        <option value="30">Monthly</option>
                    </select>
                </div>
                <button class="btn-confirm" onclick="confirmReservation()">Confirm Reservation</button>
            </div>
        </div>

        <button class="btn-reset" onclick="resetDatabase()">Reset Office Layout</button>
    </div>
</div>

<script>
    const gridA = document.getElementById('grid-a');
    const gridZ = document.getElementById('grid-z');
    let selectedId = null;

    let reservations = JSON.parse(localStorage.getItem('dykema_office_db')) || {};

    function init() {
        renderColumn(gridA, 'A');
        renderColumn(gridZ, 'Z');
    }

    function renderColumn(container, prefix) {
        container.innerHTML = '';
        for (let i = 1; i <= 16; i++) {
            const row = document.createElement('div');
            row.className = 'office-row';
            const isSplit = (prefix === 'Z' && (i === 1 || i === 3 || i === 12));

            if (isSplit) {
                row.appendChild(createBox(`${prefix}${i}-Desk 1`, true));
                row.appendChild(createBox(`${prefix}${i}-Desk 2`, true));
            } else {
                row.appendChild(createBox(`${prefix}${i}`, false));
            }
            container.appendChild(row);
        }
    }

    function createBox(id, split) {
        const data = reservations[id];
        const div = document.createElement('div');
        div.className = `office-card ${data ? 'is-reserved' : 'is-vacant'} ${split ? 'split-desk' : ''}`;
        
        let content = `<div class="office-id">${id}</div>`;
        if (data) {
            content += `<div class="reserve-info"><b>${data.user}</b><br>Expires ${data.expires}</div>`;
        } else {
            content += `<div class="status-text">Available</div>`;
        }
        
        div.innerHTML = content;
        if (!data) div.onclick = () => showForm(id);
        return div;
    }

    function showForm(id) {
        selectedId = id;
        document.getElementById('default-msg').classList.add('hidden');
        document.getElementById('booking-form').classList.remove('hidden');
        document.getElementById('selected-office-name').innerText = id;
    }

    function confirmReservation() {
        const name = document.getElementById('user-name').value;
        const days = parseInt(document.getElementById('lease-term').value);
        if (!name) return alert("Please enter a name.");

        const expiryDate = new Date();
        expiryDate.setDate(expiryDate.getDate() + days);
        const options = { month: 'long', day: 'numeric', year: 'numeric' };
        const expiryString = expiryDate.toLocaleDateString('en-US', options);

        reservations[selectedId] = { 
            user: name, 
            expires: expiryString 
        };
        localStorage.setItem('dykema_office_db', JSON.stringify(reservations));
        
        alert(`Success: ${selectedId} is now reserved for ${name}.`);
        location.reload();
    }

    function resetDatabase() {
        if(confirm("Clear all reservation data?")) {
            localStorage.removeItem('dykema_office_db');
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
