<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regus Suite 350 - Office Manager</title>
    <style>
        :root {
            --vacant-green: #2e7d32;
            --vacant-bg: #e8f5e9;
            --reserved-red: #c62828;
            --reserved-bg: #ffebee;
            --regus-dark: #1a1a1a;
            --desk-blue: #0277bd;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f2f5; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 1100px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* OFFICE SELECTION AREA */
        .office-area {
            flex: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        .column-label {
            text-align: center;
            font-weight: 700;
            color: #444;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Container for a single row in the list */
        .office-row {
            display: flex;
            gap: 10px; /* Space between desks in a split office */
            height: 45px; /* Fixed height to keep A and Z columns aligned */
        }

        .office-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
        }

        .office-card:hover:not(.is-reserved) {
            border-color: var(--regus-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        /* Visual indicator for split desks */
        .split-desk {
            border-top: 3px solid var(--desk-blue);
            font-size: 0.7rem;
        }

        /* STATUS STYLING */
        .is-vacant { background-color: var(--vacant-bg); color: var(--vacant-green); border-color: #c8e6c9; }
        .is-reserved { background-color: var(--reserved-bg); color: var(--reserved-red); border-color: #ffcdd2; cursor: not-allowed; }

        .status-text { font-size: 8px; text-transform: uppercase; margin-top: 2px; }

        /* SIDEBAR INFO */
        .sidebar {
            flex: 0.8;
            padding: 40px;
            background: #fafafa;
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .brand-header h1 { margin: 0; font-size: 1.4rem; color: var(--regus-dark); }
        .brand-header p { margin: 5px 0 25px; font-size: 0.8rem; color: #666; line-height: 1.4; }

        .booking-box {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 4px; font-weight: 700; color: #444; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        .btn-confirm {
            width: 100%;
            background: var(--regus-dark);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-reset { background: none; border: none; color: #ccc; font-size: 10px; text-decoration: underline; cursor: pointer; margin-top: auto; align-self: center; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="office-area">
        <div>
            <div class="column-label">Section A (External)</div>
            <div id="grid-a" class="grid"></div>
        </div>
        <div>
            <div class="column-label">Section Z (Internal)</div>
            <div id="grid-z" class="grid"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="brand-header">
            <h1>Bloomfield Hills</h1>
            <p>41000 Woodward Avenue<br>Suite 350, MI 48304</p>
        </div>

        <div id="default-msg">
            <p style="color:#aaa; text-align: center; font-size: 0.85rem; margin-top: 40px;">Select an office or desk to reserve.</p>
        </div>

        <div id="booking-form" class="hidden">
            <div class="booking-box">
                <h3 style="margin: 0 0 15px 0; font-size: 1rem;">Booking: <span id="selected-office-name"></span></h3>
                <div class="input-group">
                    <label>Reserving For</label>
                    <input type="text" id="user-name" placeholder="Name/Company">
                </div>
                <button class="btn-confirm" onclick="confirmReservation()">Confirm Reservation</button>
            </div>
        </div>

        <button class="btn-reset" onclick="resetDatabase()">Reset Office Layout</button>
    </div>
</div>

<script>
    const gridA = document.getElementById('grid-a');
    const gridZ = document.getElementById('grid-z');
    let selectedId = null;

    let reservations = JSON.parse(localStorage.getItem('regus_office_db')) || {};

    function init() {
        renderColumn(gridA, 'A');
        renderColumn(gridZ, 'Z');
    }

    function renderColumn(container, prefix) {
        container.innerHTML = '';
        for (let i = 1; i <= 16; i++) {
            const row = document.createElement('div');
            row.className = 'office-row';

            // Identify split offices: Z1, Z3, Z12
            const isSplit = (prefix === 'Z' && (i === 1 || i === 3 || i === 12));

            if (isSplit) {
                // Two boxes side-by-side in one row
                row.appendChild(createBox(`${prefix}${i}-Desk 1`, true));
                row.appendChild(createBox(`${prefix}${i}-Desk 2`, true));
            } else {
                // One full-width box for the row
                row.appendChild(createBox(`${prefix}${i}`, false));
            }
            container.appendChild(row);
        }
    }

    function createBox(id, split) {
        const isReserved = reservations[id];
        const div = document.createElement('div');
        div.className = `office-card ${isReserved ? 'is-reserved' : 'is-vacant'} ${split ? 'split-desk' : ''}`;
        
        div.innerHTML = `<div>${id}</div><div class="status-text">${isReserved ? 'Reserved' : 'Available'}</div>`;
        
        if (!isReserved) {
            div.onclick = () => showForm(id);
        }
        return div;
    }

    function showForm(id) {
        selectedId = id;
        document.getElementById('default-msg').classList.add('hidden');
        document.getElementById('booking-form').classList.remove('hidden');
        document.getElementById('selected-office-name').innerText = id;
    }

    function confirmReservation() {
        const name = document.getElementById('user-name').value;
        if (!name) return alert("Please enter a name.");

        reservations[selectedId] = { name: name };
        localStorage.setItem('regus_office_db', JSON.stringify(reservations));
        
        alert(`Success: ${selectedId} is now reserved.`);
        location.reload();
    }

    function resetDatabase() {
        if(confirm("Clear all reservation data?")) {
            localStorage.removeItem('regus_office_db');
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
